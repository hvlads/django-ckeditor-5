[tox]
envlist =
    py{38,39,310,311,312}-django42
    py{310,311,312,313}-django52
    py{312,313}-django60

skip_missing_interpreters = True

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
deps =
    django42: Django>=4.2,<4.3
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1
    pytest
    pytest-django
    pytest-cov
    pillow

commands =
    pytest example/blog/tests/ -v --cov=django_ckeditor_5 --cov-report=html

[testenv:lint]
basepython = python3.13
deps =
    ruff
    mypy

commands =
    ruff check django_ckeditor_5/
    mypy django_ckeditor_5/

[testenv:type]
basepython = python3.13
deps =
    mypy
    django-stubs

commands =
    mypy django_ckeditor_5/ --strict

[pytest]
DJANGO_SETTINGS_MODULE = blog.test_settings
python_files = tests.py test_*.py *_tests.py
testpaths = example/blog/tests